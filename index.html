<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adrenaline Slot Machine</title>

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="assets/faction.png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="./style.css">

    <!-- Script -->
    <script src="./script.js" defer></script>
</head>

<body>

<div id="app" class="game-app">

    <!-- ================= HEADER ================= -->
    <header class="game-header">
        <div class="brand">
            <h1 class="title">ADRENALINE SLOT MACHINE</h1>
            <p class="subtitle">High risk • High reward • Pure chaos</p>
        </div>

        <div class="paytable">
            ❌ 1 match = -2x | 😐 2 = -0.5x | 😶 3 = 0 | 🔥 4 = +0.5x | 💥 5 = +2x
        </div>
    </header>

    <!-- ================= GAME AREA ================= -->
    <main class="game-main">

        <section class="slot-container">

            <div class="slot-frame">
                <div class="slot-window">

                    <div class="outer-col"><div class="col"></div></div>
                    <div class="outer-col"><div class="col"></div></div>
                    <div class="outer-col"><div class="col"></div></div>
                    <div class="outer-col"><div class="col"></div></div>
                    <div class="outer-col"><div class="col"></div></div>
                    <div class="outer-col"><div class="col"></div></div>
                    <div class="outer-col"><div class="col"></div></div>
                    
                </div>

                <div class="slot-glow"></div>

            </div>

        </section>

        <div id="resultArea" class="result-overlay"></div>

    </main>

    <!-- ================= FOOTER ================= -->
    <footer class="game-footer">

        <!-- CONTROLS BLOCK -->
        <div class="controls" style="display:flex; flex-direction:column; gap:10px; align-items:center;">

            <!-- BET DISPLAY -->
            <button class="btn btn-warning btn-lg" style="min-width:220px; font-weight:bold;">
                💰 BET: <span id="betValue">10</span>
            </button>

            <!-- BUTTON ROW -->
            <div style="display:flex; gap:15px; align-items:center;">

                <button class="btn btn-warning btn-lg"
                        onclick="changeBet(-10)"
                        style="min-width:140px;">
                    - BET
                </button>

                <button onclick="spin(this)"
                        class="btn btn-warning btn-lg"
                        style="min-width:160px;">
                    <i class="fa-solid fa-dice"></i> SPIN
                </button>

                <button class="btn btn-warning btn-lg"
                        onclick="changeBet(10)"
                        style="min-width:140px;">
                    BET +
                </button>

            </div>

            <!-- SOUND SELECTOR -->
            <div class="dropdown">

                <button class="btn btn-warning btn-lg dropdown-toggle"
                        type="button"
                        data-bs-toggle="dropdown"
                        style="min-width:220px; font-weight:bold;">
                    🔊 SOUND: RANDOM
                </button>

                <ul class="dropdown-menu text-center" style="min-width:220px;">
                    <li><button class="dropdown-item" onclick="setSound('random')">🎲 Random sound</button></li>
                    <li><button class="dropdown-item" onclick="setSound('sound1')">🎰 Machine</button></li>
                    <li><button class="dropdown-item" onclick="setSound('sound2')">🔥 OIIA OIIA</button></li>
                </ul>

            </div>

            <!-- DIVIDER -->
            <hr style="width:100%; border:2px solid #ff9800; opacity:0.6; margin:10px 0;">

            <!-- PLAYER BAR -->
            <div style="display:flex; gap:15px; justify-content:center; align-items:center;">

                <button class="btn btn-warning btn-lg" style="min-width:200px; font-weight:bold;">
                    🧑 Player: <span class="player-name">User</span>
                </button>

                <button class="btn btn-warning btn-lg" style="min-width:200px; font-weight:bold;">
                    🪙 Coins: <span id="coins">100</span>
                </button>

            </div>

        </div>

    </footer>

</div>

<!-- Bootstrap JS (for dropdown) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
