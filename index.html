<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sloty</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>
<body>

<div class="header">
    <div class="title">ADRENALINE SLOT MACHINE</div>
    <div class="subtitle">press spin and test your luck</div>
</div>

<audio id="spinSound" src="assets/spin.mp3" preload="auto"></audio>

<div id="container">
    <div class="window-border">
        <div class="window">
            <div class="outer-spacer"></div>
            <div class="outer-col">
                <div class="col"></div>
            </div>
            <div class="outer-spacer"></div>
            <div class="outer-col">
                <div class="col"></div>
            </div>
            <div class="outer-spacer"></div>
            <div class="outer-col">
                <div class="col"></div>
            </div>
            <div class="outer-spacer"></div>
            <div class="outer-col">
                <div class="col"></div>
            </div>
            <div class="outer-spacer"></div>
            <div class="outer-col">
                <div class="col"></div>
            </div>
            <div class="outer-spacer"></div>
        </div>
    </div>

    <input type="button" onclick="spin(this)" class="start-button" value="Spin"/>
</div>

</body>
</html>
