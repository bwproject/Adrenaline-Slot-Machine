<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adrenaline Slot Machine</title>

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="assets/faction.png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="./style.css">

    <!-- Script -->
    <script src="./script.js" defer></script>
</head>

<body>

<div id="app" class="game-app">

    <!-- ================= HEADER ================= -->
    <header class="game-header">
        <div class="brand">
            <h1 class="title">ADRENALINE SLOT MACHINE</h1>
            <p class="subtitle">High risk • High reward • Pure chaos</p>
        </div>

        <div class="paytable">
            ❌ 1 match = -2x | 😐 2 = -0.5x | 😶 3 = 0 | 🔥 4 = +0.5x | 💥 5 = +2x
        </div>
    </header>

    <!-- ================= GAME AREA ================= -->
    <main class="game-main">

        <section class="slot-container">

            <div class="slot-frame">
                <div class="slot-window">

                    <div class="outer-col"><div class="col"></div></div>
                    <div class="outer-col"><div class="col"></div></div>
                    <div class="outer-col"><div class="col"></div></div>
                    <div class="outer-col"><div class="col"></div></div>
                    <div class="outer-col"><div class="col"></div></div>

                </div>

                <!-- декоративное свечение -->
                <div class="slot-glow"></div>

            </div>

        </section>

        <!-- RESULT OVERLAY -->
        <div id="resultArea" class="result-overlay"></div>

    </main>

    <!-- ================= FOOTER ================= -->
    <footer class="game-footer">

        <!-- CONTROLS -->
        <div class="controls">

            <button onclick="spin(this)" class="btn btn-warning btn-lg start-button spin-btn">
                <i class="fa-solid fa-dice"></i> SPIN
            </button>

            <div class="bet-panel">
                <div class="label">BET</div>
                <div class="value">
                    <span id="betValue">10</span>
                </div>

                <div class="bet-actions">
                    <button class="btn btn-dark btn-sm" onclick="changeBet(-10)">-</button>
                    <button class="btn btn-dark btn-sm" onclick="changeBet(10)">+</button>
                </div>
            </div>

            <div class="sound-panel">
                <select class="form-select form-select-sm" onchange="setSound(this.value)">
                    <option value="random">Random sound</option>
                    <option value="sound1">Machine</option>
                    <option value="sound2">OIIA OIIA</option>
                </select>
            </div>

        </div>

        <!-- PLAYER STATS -->
        <aside class="player-panel">

            <div class="player-info">
                <i class="fa-solid fa-user"></i>
                <span class="player-name">User</span>
            </div>

            <div class="coins-info">
                <i class="fa-solid fa-coins"></i>
                <span id="coins">100</span>
            </div>

            <div class="stats-box">
                <div id="statsContent"></div>
            </div>

        </aside>

    </footer>

</div>

</body>
</html>
