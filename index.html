<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adrenaline Slot Machine</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>
<body>

<div id="app">

    <audio id="spinSound" src="assets/spin.mp3" preload="auto"></audio>

    <div class="app-header">
        <div class="title">ADRENALINE SLOT MACHINE</div>
        <div class="subtitle">press spin and test your luck</div>

        <div class="paytable">
            ❌ 1 match = -2x bet | 😐 2 matches = -0.5x | 😶 3 matches = 0 | 🔥 4 matches = +0.5x | 💥 5 matches = +2x
        </div>
    </div>

    <div class="app-slot">
        <div class="window-border">
            <div class="window">
                <div class="outer-spacer"></div>

                <div class="outer-col"><div class="col"></div></div>
                <div class="outer-spacer"></div>

                <div class="outer-col"><div class="col"></div></div>
                <div class="outer-spacer"></div>

                <div class="outer-col"><div class="col"></div></div>
                <div class="outer-spacer"></div>

                <div class="outer-col"><div class="col"></div></div>
                <div class="outer-spacer"></div>

                <div class="outer-col"><div class="col"></div></div>

                <div class="outer-spacer"></div>
            </div>
        </div>
    </div>

    <div class="app-controls" id="controlsArea">

        <div class="controls-left">

            <button onclick="spin(this)" class="btn btn-warning btn-lg start-button">Spin</button>

            <!-- BET MOVED HERE -->
            <div class="bet-panel" style="margin-top:10px;">
                Bet: <span id="betValue">10</span>
                <div>
                    <button class="btn btn-sm btn-dark" onclick="changeBet(-10)">-</button>
                    <button class="btn btn-sm btn-dark" onclick="changeBet(10)">+</button>
                </div>
            </div>

            <!-- SOUND DROPDOWN -->
            <div style="margin-top:10px;">
                <select class="form-select form-select-sm" onchange="setSound(this.value)">
                    <option value="random">Random</option>
                    <option value="sound1">Sound 1</option>
                    <option value="sound2">Sound 2</option>
                </select>
            </div>

        </div>

        <div class="player-panel">
            <div>Player: User</div>
            <div>Coins: <span id="coins">100</span></div>
        </div>

        <div id="resultArea"></div>

    </div>

</div>

</body>
</html>
