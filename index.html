<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adrenaline Slot Machine</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>
<body>

<div id="game-wrapper">
    <audio id="spinSound" src="assets/spin.mp3" preload="auto"></audio>

    <div id="container">
    <div class="header">
        <div class="title">ADRENALINE SLOT MACHINE</div>
        <div class="subtitle">press spin and test your luck</div>
    </div>        
        <div class="window-border">
            <div class="window">
                <div class="outer-spacer"></div>
                <div class="outer-col">
                    <div class="col"></div>
                </div>
                <div class="outer-spacer"></div>
                <div class="outer-col">
                    <div class="col"></div>
                </div>
                <div class="outer-spacer"></div>
                <div class="outer-col">
                    <div class="col"></div>
                </div>
                <div class="outer-spacer"></div>
                <div class="outer-col">
                    <div class="col"></div>
                </div>
                <div class="outer-spacer"></div>
                <div class="outer-col">
                    <div class="col"></div>
                </div>
                <div class="outer-spacer"></div>
            </div>
        </div>

        <button onclick="spin(this)" class="btn btn-warning btn-lg start-button">
            <i class="fa-solid fa-dharmachakra"></i> Spin
        </button>
    </div>

</div>

</body>
</html>
