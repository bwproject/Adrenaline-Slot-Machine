<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adrenaline Slot Machine</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>
<body>

<div id="app">

    <audio id="spinSound" src="assets/spin.mp3" preload="auto"></audio>

    <!-- HEADER -->
    <div class="app-header">
        <div class="title">ADRENALINE SLOT MACHINE</div>
        <div class="subtitle">press spin and test your luck</div>
    </div>

    <!-- SLOT -->
    <div class="app-slot">
        <div class="window-border">
            <div class="window">
                <div class="outer-spacer"></div>

                <div class="outer-col"><div class="col"></div></div>
                <div class="outer-spacer"></div>

                <div class="outer-col"><div class="col"></div></div>
                <div class="outer-spacer"></div>

                <div class="outer-col"><div class="col"></div></div>
                <div class="outer-spacer"></div>

                <div class="outer-col"><div class="col"></div></div>
                <div class="outer-spacer"></div>

                <div class="outer-col"><div class="col"></div></div>

                <div class="outer-spacer"></div>
            </div>
        </div>
    </div>

    <!-- CONTROLS -->
    <div class="app-controls" id="controlsArea">

        <button onclick="spin(this)" class="btn btn-warning btn-lg start-button">
            <i class="fa-solid fa-dharmachakra"></i> Spin
        </button>

        <button onclick="toggleSettings()" class="btn btn-dark settings-btn">
            <i class="fa-solid fa-gear"></i>
        </button>

        <!-- RESULT HERE -->
        <div id="resultArea"></div>

    </div>

</div>

<!-- SETTINGS -->
<div id="settingsPanel" class="settings-panel hidden">
    <h3>⚙️ Settings</h3>

    <label>
        Sound mode:
        <select id="soundMode">
            <option value="sound1">Sound 1</option>
            <option value="sound2">Sound 2</option>
            <option value="random" selected>Random</option>
        </select>
    </label>

    <button onclick="toggleSettings()" class="btn btn-secondary mt-3">Close</button>
</div>

</body>
</html>
