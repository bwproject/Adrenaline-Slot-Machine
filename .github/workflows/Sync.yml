name: Sync bw_ipa_repo to TikTok-Downloader-Bot/webapp/slot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup git auth for private repo
        run: |
          git config --global url."https://x-access-token:${{ secrets.TARGET_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Clone target repository
        run: |
          git clone https://github.com/bwproject/TikTok-Downloader-Bot.git target

      - name: Sync files into /webapp/slot folder
        run: |
          mkdir -p target/webapp/slot

          # Полное зеркало (удаляет старые файлы в bot4)
          rsync -av --delete \
            --exclude ".git" \
            ./ target/webapp/slot/

      - name: Commit and push changes
        run: |
          cd target

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add webapp/slot

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Sync webapp/slot"
          git push origin main
